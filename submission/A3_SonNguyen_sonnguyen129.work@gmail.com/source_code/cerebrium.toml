# Cerebrium deployment: vLLM OpenAI-compatible server for EvoAgent inference.
#
# vLLM is installed via pip on Cerebrium's default base image (their builder
# cannot pull the vllm/vllm-openai image from Docker Hub).
#
# Deploy:            cerebrium deploy
# Secrets (dashboard > Secrets): HF_TOKEN=hf_...   (needed to pull model weights)
# After deploy, set in local .env:
#   CEREBRIUM_BASE_URL=https://api.aws.us-east-1.cerebrium.ai/v4/p-<PROJECT_ID>/assignment03/v1
#   CEREBRIUM_API_KEY=<your Cerebrium inference token (JWT) from the dashboard>
#   CEREBRIUM_MODEL=QuantTrio/Qwen3.5-4B-AWQ

[cerebrium.deployment]
name = "assignment03"
python_version = "3.12"
disable_auth = false
include = ['cerebrium.toml']
exclude = ['.*', 'son_env', 'runs', 'data', 'docs', 'graders', 'src', 'tutorial', '*.json']

[cerebrium.hardware]
cpu = 4.0
memory = 32.0
compute = "AMPERE_A10"
gpu_count = 1
region = "us-east-1"

[cerebrium.scaling]
min_replicas = 0            # scale-to-zero when idle (no cost); set to 1 during long proof runs to avoid cold starts
max_replicas = 1
cooldown = 600
replica_concurrency = 32    # vLLM continuous-batches many requests on one GPU
scaling_metric = "concurrency_utilization"

[cerebrium.dependencies.pip]
vllm = "==0.24.0"
huggingface_hub = "latest"
hf_transfer = "latest"

[cerebrium.runtime.custom]
port = 8000
healthcheck_endpoint = "/health"
readycheck_endpoint = "/health"
# HF_HOME on persistent storage so model weights survive cold starts.
# If this vLLM version does not support Qwen3.5, switch the model to
# "Qwen/Qwen3-4B-AWQ" here and in .env (CEREBRIUM_MODEL).
# VLLM_USE_FLASHINFER_SAMPLER=0: FlashInfer's sampler JIT-compiles CUDA kernels
# at runtime and needs nvcc, which the base image lacks — use the native sampler.
entrypoint = [
    "sh", "-c",
    "export HF_HOME=/persistent-storage/hf-cache VLLM_USE_FLASHINFER_SAMPLER=0 && vllm serve QuantTrio/Qwen3.5-4B-AWQ --host 0.0.0.0 --port 8000 --max-model-len 16384 --gpu-memory-utilization 0.90"
]
